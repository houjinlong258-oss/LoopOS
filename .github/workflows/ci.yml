name: CI

on:
  push:
    branches: [main, v0.3-alpha-hardening]
  pull_request:
    branches: [main, v0.3-alpha-hardening]

permissions:
  contents: read

jobs:
  lint-type-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure full history and tags
        run: git fetch --force --tags --prune

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        # Install both dev and workbench extras: dev is required for
        # mypy/pytest/ruff, and workbench pulls in ``rich`` + ``typer``
        # so mypy can resolve their inline stubs (these are real
        # runtime dependencies of the CLI, but optional for boot).
        run: python -m pip install -e ".[dev,workbench]"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Type-check (mypy)
        run: python -m mypy loopos tests

      - name: Fast tests
        run: python -m pytest -m "not slow" -q --no-header -p no:cacheprovider

      - name: Founding acceptance
        run: make test-acceptance

  readiness-and-bloat:
    name: Readiness + anti-bloat
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        # Same as the lint-type-test job: workbench is required so
        # downstream readiness checks can import rich / typer and the
        # mypy step (if re-enabled here later) sees their stubs.
        run: python -m pip install -e ".[dev,workbench]"

      - name: v0.2 readiness (JSON)
        run: python scripts/v0_2_readiness_check.py --json

      - name: v0.3 readiness (JSON, loopback gate ON)
        env:
          LOOPOS_LIVE_HTTP_SMOKE: "1"
        run: python scripts/v0_3_readiness_check.py --json

      - name: Anti-bloat (JSON)
        run: python scripts/anti_bloat_check.py --json

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  ci-report:
    name: CI report
    runs-on: ubuntu-latest
    needs: [lint-type-test, readiness-and-bloat, secrets]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        # ci_report.py --run re-invokes pytest/ruff/mypy locally, so
        # it needs the same dependency surface as the lint-type-test
        # job. Pulling in workbench keeps mypy from reporting missing
        # rich/typer stubs during the report generation step.
        run: python -m pip install -e ".[dev,workbench]"

      - name: Generate CI report
        run: python scripts/ci_report.py --run --output docs/reports/latest-test-report.json

      - name: Upload CI report
        uses: actions/upload-artifact@v4
        with:
          name: latest-test-report
          path: docs/reports/latest-test-report.json