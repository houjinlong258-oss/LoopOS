id: terminal-safety
name: Terminal Safety Policy
version: 0.1.0
description: Conservative terminal execution policy.
priority: 950
rules:
  - id: terminal.block.remote_code_pipe
    scope: terminal.execute
    priority: 995
    severity: critical
    tags: [terminal, safety, network]
    conditions:
      - field: cmd
        operator: regex
        value: '\b(curl|wget)\b.*\|\s*(bash|sh)\b'
    actions:
      - type: deny
        reason_code: remote_code_execution_pipe
        audit_required: true
  - id: terminal.block.destructive_patterns
    scope: terminal.execute
    priority: 980
    severity: critical
    tags: [terminal, safety]
    conditions:
      - any:
          - field: cmd
            operator: regex
            value: '\brm\s+-rf\b'
          - field: cmd
            operator: regex
            value: '\bsudo\b'
          - field: cmd
            operator: regex
            value: '\bmkfs(\.|)\w*\b'
          - field: cmd
            operator: regex
            value: '\bdd\s+if='
          - field: cmd
            operator: regex
            value: '\bcurl\b.*\|\s*(bash|sh)\b'
          - field: cmd
            operator: regex
            value: '\bwget\b.*\|\s*(bash|sh)\b'
          - field: cmd
            operator: regex
            value: '\bgit\s+config\s+--global\b'
    actions:
      - type: deny
        reason_code: terminal.destructive_pattern
        safety_level: L5
        audit_required: true
  - id: terminal.approval.dangerous_git
    scope: terminal.execute
    priority: 970
    severity: high
    tags: [terminal, safety, git]
    conditions:
      - field: cmd
        operator: regex
        value: '\bgit\s+(reset\s+--hard|clean\s+-f)\b'
    actions:
      - type: require_approval
        reason_code: terminal.dangerous_git_requires_approval
        safety_level: L3
        rollback_required: true
        audit_required: true
  - id: terminal.require_approval.high_risk
    scope: terminal.execute
    priority: 900
    severity: high
    tags: [terminal, safety]
    conditions:
      - field: risk_level
        operator: risk_at_least
        value: high
    actions:
      - type: require_approval
        reason_code: terminal.high_risk_requires_approval
        audit_required: true
  - id: terminal.require_approval.medium_risk
    scope: terminal.execute
    priority: 700
    severity: medium
    tags: [terminal, permission]
    conditions:
      - field: risk_level
        operator: equals
        value: medium
    actions:
      - type: require_approval
        reason_code: terminal.medium_risk_requires_approval
        audit_required: true
  - id: terminal.default.allow
    scope: terminal.execute
    priority: 100
    severity: info
    tags: [terminal]
    conditions: []
    actions:
      - type: allow
        reason_code: terminal.default_allow
